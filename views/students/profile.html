<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard - DE-LAMBO COLLEGE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; }

.layout {
  display: grid;
  grid-template-areas: "top top" "left main" "footer footer";
  grid-template-columns: 240px 1fr;
  grid-template-rows: auto 1fr auto;
  min-height: 100vh;
}

.top-bar { grid-area: top; background: crimson; color: white; display: flex; align-items: center; justify-content: space-between; padding: 20px; }
.left-bar { grid-area: left; background: crimson; color: white; padding: 20px; }
.main { grid-area: main; background: #f8fafc; padding: 20px; }
.footer { grid-area: footer; background: crimson; color: white; display: flex; align-items: center; justify-content: center; padding: 15px; }

img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid white; }

ul.left-bar-menu-list li { list-style: none; margin: 8px 0; }
ul.left-bar-menu-list li a { text-decoration: none; color: white; display: block; padding: 8px 10px; border-radius: 6px; }
ul.left-bar-menu-list li a:hover { background: rgba(255,255,255,0.15); }

/* Modal Styles */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  z-index: 100;
}
.modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 600px; position: relative; }
#close-modal { float: right; cursor: pointer; font-size: 1.5rem; border: none; background: none; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }

/* Carousel Styles */
.carousel { position: relative; max-width: 100%; margin-bottom: 30px; overflow: hidden; border-radius: 10px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.carousel-track { display: flex; transition: transform 0.5s ease-in-out; }
.carousel-slide { min-width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 1.5rem; }
.carousel-slide:nth-child(1) { background: #ef4444; }
.carousel-slide:nth-child(2) { background: #3b82f6; }
.carousel-slide:nth-child(3) { background: #22c55e; }

@media (max-width: 768px) {
  .layout { grid-template-areas: "top" "left" "main" "footer"; grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="layout">
  <header class="top-bar">
    <h2>DE-LAMBO COLLEGE</h2>
    <h4 class="student-name"></h4>
  </header>

  <aside class="left-bar">
    <div class="image"></div><hr><br>
    <ul class="left-bar-menu-list">
      <li><a href="/start-exam">Take Exam</a></li>
      <li><a href="#" id="get-result-link">View Result</a></li>
      <li><a href="/information">View Information</a></li>
      <li><a href="/logout">Logout</a></li>
    </ul>
  </aside>

  <main class="main">
    <div class="carousel">
      <div class="carousel-track">
        <div class="carousel-slide">Welcome to DE-LAMBO COLLEGE</div>
        <div class="carousel-slide">Check Your Exam Results</div>
        <div class="carousel-slide">Contact Us for Support</div>
      </div>
    </div>
  </main>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
        <button id="close-modal">&times;</button>
        <div id="modal-student-img" style="text-align: center; margin-bottom: 15px;"></div>
        <h3>My Exam Results</h3>
        <table id="result-table">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Total Questions</th>
                    <th>Score</th>
                    <th>Type</th>
                    <th>Percentage</th>
                </tr>
            </thead>
            <tbody id="result-body"></tbody>
        </table>
    </div>
  </div>

  <footer class="footer">
    <span>&copy; DE-LAMBO COLLEGE</span>
  </footer>
</div>

<script>
// Load user data

window.onload = function(){
  const name = localStorage.getItem('name');alert("name");
  const image = localStorage.getItem('image');
  if(!name){ location.href = '/login-student'; return; }
  document.querySelector('.student-name').textContent = name;
  document.querySelector('.image').innerHTML = `<img src='${image}'>`;
}

// Result Modal Logic
const overlay = document.getElementById('modal-overlay');
const resultBody = document.getElementById('result-body');
const viewResultBtn = document.getElementById('get-result-link');
const closeBtn = document.getElementById('close-modal');

viewResultBtn.addEventListener('click', async function(e) {
    e.preventDefault();
    const studentName = localStorage.getItem('name');
    const studentImg = localStorage.getItem('image');
    
    // Inject image into modal
    document.getElementById('modal-student-img').innerHTML = 
        `<img src="${studentImg}" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid crimson;">`;

    try {
        let response = await fetch('/get-score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: studentName })
        });
        
        let result = await response.json();
        resultBody.innerHTML = '';
        
        result.score.forEach(el => {
            resultBody.innerHTML += `<tr>
                <td>${el.subject}</td>
                <td>${el.totalQuestions}</td>
                <td>${el.score}</td>
                <td>${el.type}</td>
                <td>${el.percentage}%</td>
            </tr>`;
        });
        overlay.style.display = 'flex';
    } catch (err) {
        alert("Failed to fetch data.");
    }
});

closeBtn.onclick = () => overlay.style.display = 'none';
window.onclick = (event) => { if (event.target == overlay) overlay.style.display = 'none'; };
</script>
</body>
</html>
