<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard - DE-LAMBO COLLEGE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; }

.layout {
  display: grid;
  grid-template-areas: "top top" "left main" "footer footer";
  grid-template-columns: 240px 1fr;
  grid-template-rows: auto 1fr auto;
  min-height: 100vh;
}

.top-bar { grid-area: top; background: crimson; color: white; display: flex; align-items: center; justify-content: space-between; padding: 20px; }
.left-bar { grid-area: left; background: crimson; color: white; padding: 20px; }
.main { grid-area: main; background: #f8fafc; padding: 20px; }
.footer { grid-area: footer; background: crimson; color: white; display: flex; justify-content: center; padding: 15px; }

/* Modal Styles */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
.modal-content { background: white; padding: 20px; border-radius: 8px; width: 80%; max-width: 600px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }

/* Carousel Styles (Omitted for brevity, kept from your original) */
.carousel { position: relative; max-width: 100%; margin: 0 auto 30px; overflow: hidden; border-radius: 10px; }
.carousel-track { display: flex; transition: transform 0.5s ease-in-out; }
.carousel-slide { min-width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; background: #ef4444; }
</style>
</head>
<body>

<div class="layout">
  <header class="top-bar">
    <h2>DE-LAMBO COLLEGE</h2>
    <div class="right"><h4 class="student-name"></h4></div>
  </header>

  <aside class="left-bar">
    <div class="image"></div>
    <ul class="left-bar-menu-list">
      <li><a href="/start-exam">Take Exam</a></li>
      <li><a href="#" id="view-result-nav">View Result</a></li>
    </ul>
  </aside>

  <main class="main">
    <div class="carousel">
      <div class="carousel-track">
        <div class="carousel-slide">Welcome to DE-LAMBO COLLEGE</div>
      </div>
    </div>

    <h3>Check Scores</h3>
    <div class="container">
        <input type="text" id="name-input" placeholder="Enter Student Name">
        <button type="button" id="get-scores-btn">Get Scores</button>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <button id="close-modal">&times;</button>
            <table id="result-table">
                <thead><tr><th>Subject</th><th>Score</th></tr></thead>
                <tbody id="result-body"></tbody>
            </table>
        </div>
    </div>
  </main>
</div>

<script>
// Load user data
window.onload = function(){
  const name = localStorage.getItem('name');
  if(!name){ location.href = '/login-student'; return; }
  document.querySelector('.student-name').textContent = name;
  document.querySelector('.image').innerHTML = `<img src='${localStorage.getItem('image')}' style="width:100px; border-radius:50%">`;
}

// Fetch Results Logic
document.addEventListener('DOMContentLoaded', () => {
    const overlay = document.getElementById('modal-overlay');
    const resultBody = document.getElementById('result-body');
    const btn = document.getElementById('get-scores-btn');
    const closeBtn = document.getElementById('close-modal');

    btn.addEventListener('click', async function() {
        const studentName = document.getElementById('name-input').value || localStorage.getItem('name');
        
        try {
            let response = await fetch('/get-score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: studentName })
            });
            
            let result = await response.json();
            resultBody.innerHTML = '';
            
            result.score.forEach(el => {
                resultBody.innerHTML += `<tr><td>${el.subject}</td><td>${el.score}</td></tr>`;
            });

            overlay.style.display = 'flex';
        } catch (err) {
            console.error("Error:", err);
            alert("Failed to fetch data.");
        }
    });

    closeBtn.onclick = () => overlay.style.display = 'none';
});
</script>
</body>
</html>
