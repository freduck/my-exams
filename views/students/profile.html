

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Document</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

.layout {
  display: grid;
  grid-template-areas:
    "top top"
    "left main"
    "footer footer";
  grid-template-columns: 240px 1fr;
  grid-template-rows: 60px 1fr 50px;
  min-height: 100vh;
  gap: 80px;
}

.top-bar {
  grid-area: top;
  background: #1e293b;
  color: white;
  display: flex;
  align-items: center;
  padding: 60px;
  

}
.top-bar,.left-bar,.footer{
  background: crimson !important;
}
.left-bar {
  grid-area: left;
  background: #334155;
  color: white;
  padding: 20px;
}

.main {
  grid-area: main;
  background: #f8fafc;
  padding: 20px;
}

.footer {
  grid-area: footer;
  background: #1e293b;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}
img{
  width: 100px;
  height: 100px;
}
div.right{
  float: right;
  width: 300px;
  margin-left: 800px;
}
ul.left-bar-menu-list li{
list-style-type: none;
margin: 8px;
padding: 5px;
}
ul.left-bar-menu-list li a{
  text-decoration: none;
  color: white;
}
.date-menu{
  margin-left: 30px;
}
/* Mobile: stack everything */
@media (max-width: 768px) {
  .layout {
    grid-template-areas:
      "top"
      "left"
      "main"
      "footer";
    grid-template-columns: 1fr;
    grid-template-rows: 60px auto 1fr auto;
  }
}
</style>
</head>

  <script>
    function formatDate(date) {
  const d = new Date(date);
  const day = d.getDate();
  const suffix = (day > 3 && day < 21) ? 'th' : ['th','st','nd','rd','th','th','th','th','th','th'][day % 10];
  const monthYear=new Intl.DateTimeFormat('en-GB',{month:'long',year:'numeric'}).format(d);
  
  const timpart = new Intl.DateTimeFormat('en-GB',{
    hour:'2-digit',
    minute:'2-digit',
    hour12:true
  }).format(d);
  return `Today's Date is : ${day}${suffix} ${monthYear} Time is: ${timpart}`;
}
