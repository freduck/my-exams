<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard - DE-LAMBO COLLEGE</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
}

.layout {
  display: grid;
  grid-template-areas:
    "top top"
    "left main"
    "footer footer";
  grid-template-columns: 240px 1fr;
  grid-template-rows: auto 1fr auto;
  min-height: 100vh;
  gap: 0; /* killed the 80px gap that was pushing content apart */
}

.top-bar {
  grid-area: top;
  background: crimson;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: clamp(15px, 3vw, 30px);
  flex-wrap: wrap;
  gap: 10px;
}

.left-bar, .footer {
  background: crimson;
  color: white;
}

.left-bar {
  grid-area: left;
  padding: 20px;
}

.main {
  grid-area: main;
  background: #f8fafc;
  padding: 20px;
}

.footer {
  grid-area: footer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 15px;
  flex-wrap: wrap;
  text-align: center;
}

img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid white;
}

.top-bar .right h4 {
  font-size: 1rem;
  font-weight: 500;
}

ul.left-bar-menu-list li {
  list-style: none;
  margin: 8px 0;
}

ul.left-bar-menu-list li a {
  text-decoration: none;
  color: white;
  display: block;
  padding: 8px 10px;
  border-radius: 6px;
  transition: background 0.2s;
}

ul.left-bar-menu-list li a:hover {
  background: rgba(255,255,255,0.15);
}

.date-menu {
  font-size: 0.9rem;
  opacity: 0.9;
}

/* Carousel Styles */
.carousel {
  position: relative;
  max-width: 100%;
  margin: 0 auto 30px;
  overflow: hidden;
  border-radius: 10px;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.carousel-track {
  display: flex;
  transition: transform 0.5s ease-in-out;
}

.carousel-slide {
  min-width: 100%;
  height: 250px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  color: white;
  font-weight: 600;
}

.carousel-slide:nth-child(1) { background: #ef4444; }
.carousel-slide:nth-child(2) { background: #3b82f6; }
.carousel-slide:nth-child(3) { background: #22c55e; }

.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  font-size: 1.2rem;
  border-radius: 5px;
  z-index: 10;
}

.carousel-btn:hover { background: rgba(0,0,0,0.7); }
.carousel-btn.prev { left: 10px; }
.carousel-btn.next { right: 10px; }

.carousel-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 15px 0;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #cbd5e1;
  cursor: pointer;
  transition: background 0.3s;
}

.dot.active { background: crimson; }

/* Mobile: stack everything */
@media (max-width: 768px) {
  .layout {
    grid-template-areas:
      "top"
      "left"
      "main"
      "footer";
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
  }
  
  .top-bar {
    flex-direction: column;
    text-align: center;
  }
  
  .carousel-slide {
    height: 180px;
    font-size: 1.2rem;
  }
}
</style>
</head>
<body>

<div class="layout">
  <header class="top-bar">
    <h2>DE-LAMBO COLLEGE</h2>
    <div class="right">
      <h4 class="student-name"></h4>
    </div>
  </header>

  <aside class="left-bar">
    <div class="image"></div><br>
    <hr>
    <br>
    <ul class="left-bar-menu-list">
      <li><a href="/start-exam">Take Exam</a></li>
      <li><a href="/student-score">View Result</a></li>
      <li><a href="/information">View Information</a></li>
      <li><a href="/contact-school">Contact School</a></li>
      <li><a href="/logout">Logout</a></li>
    </ul>
  </aside>

  <main class="main">
    <!-- Carousel -->
    <div class="carousel">
      <div class="carousel-track">
        <div class="carousel-slide">Welcome to DE-LAMBO COLLEGE</div>
        <div class="carousel-slide">Check Your Exam Results</div>
        <div class="carousel-slide">Contact Us for Support</div>
      </div>
      <button class="carousel-btn prev">&#10094;</button>
      <button class="carousel-btn next">&#10095;</button>
      <div class="carousel-dots"></div>
    </div>

    <h3>Main Content</h3>
    <p>Your dashboard content goes here.</p>
  </main>

  <footer class="footer">
    <span>&copy; DE-LAMBO COLLEGE</span>
    <h4 class="date-menu"></h4>
  </footer>
</div>

<script>
// Format date
function formatDate(date) {
  const d = new Date(date);
  const day = d.getDate();
  const suffix = (day > 3 && day < 21) ? 'th' : ['th','st','nd','rd','th','th','th','th','th','th'][day % 10];
  const monthYear = new Intl.DateTimeFormat('en-GB',{month:'long',year:'numeric'}).format(d);
  const timePart = new Intl.DateTimeFormat('en-GB',{hour:'2-digit',minute:'2-digit',hour12:true}).format(d);
  return `Today's Date: ${day}${suffix} ${monthYear} | Time: ${timePart}`;
}

// Load user data
let name = localStorage.getItem('name');
window.onload = function(){
  if(!name){ // fixed: was = null, should be !name
    location.href = '/login-student';
    return;
  }
  document.querySelector('.student-name').textContent = name;
  document.querySelector('.image').innerHTML = `<img src='${localStorage.getItem('image')}'>`;
  document.querySelector('.date-menu').textContent = formatDate(new Date());
}

// Carousel logic
const track = document.querySelector('.carousel-track');
const slides = Array.from(track.children);
const nextBtn = document.querySelector('.carousel-btn.next');
const prevBtn = document.querySelector('.carousel-btn.prev');
const dotsContainer = document.querySelector('.carousel-dots');

let currentSlide = 0;

// Create dots
slides.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.classList.add('dot');
  if(i === 0) dot.classList.add('active');
  dot.addEventListener('click', () => goToSlide(i));
  dotsContainer.appendChild(dot);
});
const dots = Array.from(dotsContainer.children);

function updateCarousel() {
  track.style.transform = `translateX(-${currentSlide * 100}%)`;
  dots.forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
}

function goToSlide(index) {
  currentSlide = index;
  updateCarousel();
}

nextBtn.addEventListener('click', () => {
  currentSlide = (currentSlide + 1) % slides.length;
  updateCarousel();
});

prevBtn.addEventListener('click', () => {
  currentSlide = (currentSlide - 1 + slides.length) % slides.length;
  updateCarousel();
});

// Auto slide every 4s
setInterval(() => {
  currentSlide = (currentSlide + 1) % slides.length;
  updateCarousel();
}, 4000);
</script>

</body>
</html>
