<div class="container">
    <input type="text" name="name" id="name" placeholder="Enter Student Name">
    <button type="button" id="get-scores">Get Scores</button>
</div>

<div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
        <button id="close-modal">&times;</button>
        <table id="result-table">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Total Questions</th>
                    <th>Score</th>
                    <th>Type</th>
                    <th>Percentage</th>
                </tr>
            </thead>
            <tbody id="result-body"></tbody>
        </table>
    </div>
</div>

<style>
    /* Modal Styling */
    .modal-overlay {
        display: none; /* Hidden by default */
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.5);
        justify-content: center;
        align-items: center;
    }
    .modal-content {
        background: white;
        padding: 20px;
        border-radius: 8px;
        max-width: 90%;
        max-height: 80vh;
        overflow-y: auto;
    }
    #close-modal { float: right; cursor: pointer; border: none; background: none; font-size: 20px; }
    
    /* Table Responsive Adjustments */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border: 1px solid #ddd; }
</style>

<script>
    const overlay = document.getElementById('modal-overlay');
    const resultBody = document.getElementById('result-body');

    document.getElementById('get-scores').addEventListener('click', async function() {
        let name = document.getElementById('name').value;
        
        let response = await fetch('/get-score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
        });
        
        let result = await response.json();
        
        // Clear previous results
        resultBody.innerHTML = '';
        
        // Populate new results
        result.score.forEach(el => {
            resultBody.innerHTML += `<tr><td>${el.subject}</td><td>${el.totalQuestions}</td><td>${el.score}</td><td>${el.type}</td><td>${el.percentage}%</td></tr>`;
        });

        // Show Modal
        overlay.style.display = 'flex';
    });

    // Close functionality
    document.getElementById('close-modal').onclick = () => overlay.style.display = 'none';
    window.onclick = (event) => { if (event.target == overlay) overlay.style.display = 'none'; };
</script>
