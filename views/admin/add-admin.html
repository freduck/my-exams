<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px; /* Added padding for mobile screen edges */
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            /* Allows content to scroll if it exceeds screen height on small phones */
            max-height: 90vh;
            overflow-y: auto; 
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 480px) {
            .modal-content {
                padding: 20px;
            }
            h2 { font-size: 1.2rem; }
        }

        /* Form Element Styles */
        .space { padding: 10px 0; }
        input { 
            padding: 12px; 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px; /* 16px prevents iOS zoom on focus */
        }
        button { 
            padding: 14px; 
            width: 100%; 
            cursor: pointer; 
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
        }
        button:disabled { background-color: #aaa; }
        h2 { text-align: center; margin-top: 0; color: #333; }
    </style>
</head>
<body>

<div class="modal-overlay" id="adminModal">
    <div class="modal-content">
        <div class="space">
            <h2>Add Admin</h2>
        </div>
        <div class="space">
            <input type="text" id="name" placeholder="Name">
        </div>
        <div class="space">
            <input type="email" id="email" placeholder="E-mail">
        </div>
        <div class="space">
            <input type="text" id="user-name" placeholder="User-name">
        </div>
        <div class="space">
            <input type="password" id="password" placeholder="Password">
        </div>
        <div class="space">
            <button type="button" class="btn-login">Upload</button>
        </div>
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('adminModal').style.display = 'flex';
    });

    const button = document.querySelector('.btn-login');
    const name = document.getElementById('name');
    const email = document.getElementById('email');
    const username = document.getElementById('user-name');
    const password = document.getElementById('password');

    button.addEventListener('click', async function(){
        const data = {
            name: name.value,
            email: email.value,
            username: username.value,
            password: password.value
        };
        
        this.textContent = 'Uploading Admin...';
        this.disabled = true;

        await new Promise(resolve => setTimeout(resolve, 3000));

        try {
            let login = await fetch('/add-admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await login.json();
            console.log(result);
            document.getElementById('adminModal').style.display = 'none';
        } catch (error) {
            console.error('Error:', error);
        } finally {
            this.textContent = 'Upload';
            this.disabled = false;
        }
    });
</script>
</body>
</html>
