<!DOCTYPE html>
<html>
<head>
<style>
    /* Modal Styles */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6); /* Slightly darker for better contrast */
        backdrop-filter: blur(4px);    /* Adds a modern blur effect to the background */
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
    }

    .modal-content {
        background: white;
        width: 90%;             /* Broadens the modal */
        max-width: 600px;       /* Sets a comfortable maximum width */
        padding: 40px;          /* Increased padding for better breathing room */
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* Form Element Styles */
    .space { padding: 10px 0; }
    input { 
        padding: 12px; 
        width: 100%; 
        box-sizing: border-box; /* Ensures padding doesn't increase width */
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
    }
    button { 
        padding: 14px; 
        width: 100%; 
        cursor: pointer; 
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        font-weight: bold;
    }
    button:disabled { background-color: #aaa; }
    h2 { text-align: center; margin-top: 0; color: #333; }
</style>
</head>
<body>

<div class="modal-overlay" id="adminModal">
    <div class="modal-content">
        <div class="space">
            <h2>Add Admin</h2>
        </div>
        <div class="space">
            <input type="text" id="name" placeholder="Name">
        </div>
        <div class="space">
            <input type="email" id="email" placeholder="E-mail">
        </div>
        <div class="space">
            <input type="text" id="user-name" placeholder="User-name">
        </div>
        <div class="space">
            <input type="password" id="password" placeholder="Password">
        </div>
        <div class="space">
            <button type="button" class="btn-login">Upload</button>
        </div>
    </div>
</div>

<script>
    // Trigger modal on load
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('adminModal').style.display = 'flex';
    });

    const button = document.querySelector('.btn-login');
    const name = document.getElementById('name');
    const email = document.getElementById('email');
    const username = document.getElementById('user-name');
    const password = document.getElementById('password');

    button.addEventListener('click', async function(){
        const data = {
            name: name.value,
            email: email.value,
            username: username.value,
            password: password.value
        };
        
        this.textContent = 'Uploading Admin...';
        this.disabled = true;

        await new Promise(resolve => setTimeout(resolve, 3000));

        try {
            let login = await fetch('/add-admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await login.json();
            console.log(result);
            document.getElementById('adminModal').style.display = 'none';
        } catch (error) {
            console.error('Error:', error);
        } finally {
            this.textContent = 'Upload';
            this.disabled = false;
        }
    });
</script>
</body>
</html>
