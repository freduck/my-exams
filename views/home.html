<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE-LAMBO COLLEGE</title>
<style>
* { padding: 0; margin: 0; box-sizing: border-box; }

body { font-family: system-ui, sans-serif; }

.top {
  padding: 14px 10px;
  background: crimson;
  color: white;
  text-align: center;
}

.top h2 { font-size: 1.2rem; margin-bottom: 8px; }

.divider {
  display: flex;
  justify-content: center;
  gap: 12px;
}

.divider a {
  color: white;
  text-decoration: none;
  font-size: 0.9rem;
  padding: 3px 6px;
}

main {
  padding: 8px 6px 4px 6px; /* minimal */
  background: #f8fafc;
}

.carousel {
  position: relative;
  max-width: 1000px;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 6px;
}

.carousel-track {
  display: flex;
  transition: transform 0.6s ease-in-out;
}

.carousel-slide {
  flex: 0 0 100%;
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  color: white;
  font-weight: 600;
  background: linear-gradient(135deg, #dc2626, #991b1b);
}

.carousel-slide:nth-child(2) { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
.carousel-slide:nth-child(3) { background: linear-gradient(135deg, #16a34a, #15803d); }

.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.7);
  color: white;
  border: none;
  padding: 4px 7px;
  font-size: 0.9rem;
  border-radius: 3px;
}

.carousel-btn.prev { left: 4px; }
.carousel-btn.next { right: 4px; }

.carousel-dots {
  display: flex;
  justify-content: center;
  gap: 5px;
  padding: 5px 0 0;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #cbd5e1;
}

.dot.active { background: crimson; }

footer {
  background: crimson;
  color: white;
  padding: 8px 10px;
  text-align: center;
  font-size: 0.75rem;
}

/* Desktop */
@media (min-width: 601px) {
  .top { padding: 22px 30px; text-align: left; display: flex; justify-content: space-between; }
  .top h2 { font-size: 1.6rem; margin-bottom: 0; }
  main { padding: 18px 15px 8px 15px; }
  .carousel-slide { height: 210px; font-size: 1.4rem; }
  footer { padding: 12px 20px; font-size: 0.9rem; }
}
</style>
</head>
<body>
  <div class="top">
    <h2>DE-LAMBO COLLEGE</h2>
    <div class="divider">
      <a href="/login-admin">Admin</a>
      <a href="/login-student">Students</a>	
      <a href="/parent-login">Parents</a>
    </div>
  </div>

  <main>
    <div class="carousel">
      <div class="carousel-track">
        <div class="carousel-slide">Welcome to DE-LAMBO COLLEGE</div>
        <div class="carousel-slide">Excellence in Education Since 2005</div>
        <div class="carousel-slide">Join Us Today – Admissions Open</div>
      </div>
      <button class="carousel-btn prev">&#10094;</button>
      <button class="carousel-btn next">&#10095;</button>
      <div class="carousel-dots"></div>
    </div>
  </main>

  <footer><span id="datetime"></span></footer>

<script>
const track = document.querySelector('.carousel-track');
const slides = Array.from(track.children);
const nextBtn = document.querySelector('.carousel-btn.next');
const prevBtn = document.querySelector('.carousel-btn.prev');
const dotsContainer = document.querySelector('.carousel-dots');

let currentSlide = 0;

slides.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.classList.add('dot');
  if(i === 0) dot.classList.add('active');
  dot.onclick = () => goToSlide(i);
  dotsContainer.appendChild(dot);
});
const dots = Array.from(dotsContainer.children);

function updateCarousel() {
  track.style.transform = `translateX(-${currentSlide * 100}%)`;
  dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
}

function goToSlide(i) { currentSlide = i; updateCarousel(); }

nextBtn.onclick = () => { currentSlide = (currentSlide + 1) % slides.length; updateCarousel(); };
prevBtn.onclick = () => { currentSlide = (currentSlide - 1 + slides.length) % slides.length; updateCarousel(); };

setInterval(() => { currentSlide = (currentSlide + 1) % slides.length; updateCarousel(); }, 4000);
window.addEventListener('resize', updateCarousel);
updateCarousel();

function updateDateTime() {
  const now = new Date();
  document.getElementById('datetime').textContent = now.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
  });
}
updateDateTime();
setInterval(updateDateTime, 1000);
</script>
</body>
</html>
