<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE-LAMBO COLLEGE</title>
<style>
* {
  padding: 0;
  margin: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
}

/* Header */
.top {
  padding: 18px 15px;
  background-color: crimson;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.top h2 {
  font-size: 1.3rem;
}

.divider {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
}

.divider a {
  color: white;
  text-decoration: none;
  font-weight: 500;
  padding: 4px 8px;
  border-radius: 4px;
}

.divider a:hover {
  background: rgba(255,255,255,0.2);
}

/* Main + Carousel - main now grows to fill space */
main {
  flex: 1; /* fills space between header and footer */
  padding: 12px 10px 8px 10px;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
}

.carousel {
  position: relative;
  max-width: 1000px;
  margin: 0 auto;
  overflow: hidden;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  width: 100%;
}

.carousel-track {
  display: flex;
  transition: transform 0.6s ease-in-out;
  width: 100%;
}

.carousel-slide {
  flex: 0 0 100%;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: white;
  font-weight: 600;
  padding: 15px;
  text-align: center;
}

.carousel-slide:nth-child(1) { background: linear-gradient(135deg, #dc2626, #991b1b); }
.carousel-slide:nth-child(2) { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
.carousel-slide:nth-child(3) { background: linear-gradient(135deg, #16a34a, #15803d); }

.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.7);
  color: white;
  border: none;
  padding: 5px 9px;
  cursor: pointer;
  font-size: 1.1rem;
  border-radius: 4px;
  z-index: 10;
}

.carousel-btn.prev { left: 6px; }
.carousel-btn.next { right: 6px; }

.carousel-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 8px 0 0;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #cbd5e1;
  cursor: pointer;
}

.dot.active { background: crimson; }

/* Footer - no margin-top auto, sits right after main */
footer {
  background: crimson;
  color: white;
  padding: 10px 15px;
  text-align: center;
  font-size: 0.85rem;
}

/* Desktop tweaks */
@media (min-width: 601px) {
  .top { padding: 30px 40px; }
  .top h2 { font-size: 1.8rem; }
  main { padding: 25px 20px 15px 20px; }
  .carousel-slide { height: 240px; font-size: 1.6rem; }
  footer { padding: 15px 20px; font-size: 0.95rem; }
}
</style>
</head>
<body>
  <div class="top">
    <h2>DE-LAMBO COLLEGE</h2>
    <div class="divider">
      <a href="/login-admin">Admin</a>
      <a href="/login-student">Students</a>	
      <a href="/parent-login">Parents</a>
    </div>
  </div>

  <main>
    <div class="carousel">
      <div class="carousel-track">
        <div class="carousel-slide">Welcome to DE-LAMBO COLLEGE</div>
        <div class="carousel-slide">Excellence in Education Since 2005</div>
        <div class="carousel-slide">Join Us Today – Admissions Open</div>
      </div>
      <button class="carousel-btn prev">&#10094;</button>
      <button class="carousel-btn next">&#10095;</button>
      <div class="carousel-dots"></div>
    </div>
  </main>

  <footer>
    <span id="datetime"></span>
  </footer>

<script>
const track = document.querySelector('.carousel-track');
const slides = Array.from(track.children);
const nextBtn = document.querySelector('.carousel-btn.next');
const prevBtn = document.querySelector('.carousel-btn.prev');
const dotsContainer = document.querySelector('.carousel-dots');

let currentSlide = 0;

slides.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.classList.add('dot');
  if(i === 0) dot.classList.add('active');
  dot.addEventListener('click', () => goToSlide(i));
  dotsContainer.appendChild(dot);
});
const dots = Array.from(dotsContainer.children);

function updateCarousel() {
  const slideWidth = track.parentElement.offsetWidth;
  track.style.transform = `translateX(-${currentSlide * slideWidth}px)`;
  dots.forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
}

function goToSlide(index) {
  currentSlide = index;
  updateCarousel();
}

nextBtn.addEventListener('click', () => {
  currentSlide = (currentSlide + 1) % slides.length;
  updateCarousel();
});

prevBtn.addEventListener('click', () => {
  currentSlide = (currentSlide - 1 + slides.length) % slides.length;
  updateCarousel();
});

setInterval(() => {
  currentSlide = (currentSlide + 1) % slides.length;
  updateCarousel();
}, 4000);

window.addEventListener('resize', updateCarousel);
window.addEventListener('orientationchange', () => setTimeout(updateCarousel, 100));

updateCarousel();

function updateDateTime() {
  const now = new Date();
  const options = { 
    weekday: 'long', 
    year: 'numeric', 
    month: 'long', 
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: true
  };
  document.getElementById('datetime').textContent = 
    now.toLocaleDateString('en-US', options);
}
updateDateTime();
setInterval(updateDateTime, 1000);
</script>
</body>
</html>
