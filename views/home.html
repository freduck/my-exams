<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE-LAMBO COLLEGE</title>
<style>
  /* Reset and Base Styles */
  * { padding: 0; margin: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; }

  /* Header Section */
  .top {
    padding: 1rem;
    background: #b91c1c; /* Slightly deeper crimson */
    color: white;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .top h2 { font-size: 1.4rem; margin-bottom: 12px; letter-spacing: 1px; }

  .divider {
    display: flex;
    justify-content: center;
    gap: 15px;
  }

  .divider a {
    color: white;
    text-decoration: none;
    font-size: 0.85rem;
    padding: 5px 12px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    transition: background 0.3s;
  }

  .divider a:hover { background: rgba(255,255,255,0.2); }

  /* Main Content */
  main {
    padding: 15px;
    background: #f8fafc;
    min-height: 60vh;
  }

  /* Carousel Styles */
  .carousel {
    position: relative;
    max-width: 1000px;
    margin: 0 auto;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .carousel-track {
    display: flex;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .carousel-slide {
    flex: 0 0 100%;
    height: 200px; /* Taller on mobile */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    font-size: 1.1rem;
    color: white;
    font-weight: 600;
    background: linear-gradient(135deg, #dc2626, #991b1b);
  }

  .carousel-slide:nth-child(2) { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
  .carousel-slide:nth-child(3) { background: linear-gradient(135deg, #16a34a, #15803d); }

  /* Buttons */
  .carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 10px 14px;
    cursor: pointer;
    border-radius: 50%;
    transition: background 0.3s;
    z-index: 10;
  }

  .carousel-btn:hover { background: rgba(0,0,0,0.8); }
  .carousel-btn.prev { left: 10px; }
  .carousel-btn.next { right: 10px; }

  /* Dots */
  .carousel-dots {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: background 0.3s;
  }

  .dot.active { background: white; transform: scale(1.2); }

  /* Footer */
  footer {
    background: #b91c1c;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 0.85rem;
  }

  /* Desktop Adjustments */
  @media (min-width: 768px) {
    .top { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
    .top h2 { margin-bottom: 0; font-size: 1.8rem; }
    .carousel-slide { height: 350px; font-size: 2rem; }
    .divider a { font-size: 1rem; }
  }
</style>
</head>
<body>

  <header class="top">
    <h2>DE-LAMBO COLLEGE</h2>
    <nav class="divider">
      <a href="/login-admin">Admin</a>
      <a href="/login-student">Students</a>	
      <a href="/parent-login">Parents</a>
    </nav>
  </header>

  <main>
    <div class="carousel">
      <div class="carousel-track">
        <div class="carousel-slide">Welcome to DE-LAMBO COLLEGE</div>
        <div class="carousel-slide">Excellence in Education Since 2005</div>
        <div class="carousel-slide">Join Us Today – Admissions Open</div>
      </div>
      
      <button class="carousel-btn prev" aria-label="Previous Slide">&#10094;</button>
      <button class="carousel-btn next" aria-label="Next Slide">&#10095;</button>

      <div class="carousel-dots"></div>
    </div>
  </main>

  <footer>
    <div id="datetime">Loading date and time...</div>
    <p style="margin-top: 5px; opacity: 0.8;">&copy; 2024 De-Lambo College. All rights reserved.</p>
  </footer>

<script>
  const track = document.querySelector('.carousel-track');
  const slides = Array.from(track.children);
  const nextBtn = document.querySelector('.carousel-btn.next');
  const prevBtn = document.querySelector('.carousel-btn.prev');
  const dotsContainer = document.querySelector('.carousel-dots');

  let currentSlide = 0;
  let slideInterval;

  // Create Dots
  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.classList.add('dot');
    if(i === 0) dot.classList.add('active');
    dot.addEventListener('click', () => {
      goToSlide(i);
      resetTimer();
    });
    dotsContainer.appendChild(dot);
  });

  const dots = Array.from(dotsContainer.children);

  function updateCarousel() {
    track.style.transform = `translateX(-${currentSlide * 100}%)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
  }

  function goToSlide(i) {
    currentSlide = i;
    updateCarousel();
  }

  function nextSlide() {
    currentSlide = (currentSlide + 1) % slides.length;
    updateCarousel();
  }

  function prevSlide() {
    currentSlide = (currentSlide - 1 + slides.length) % slides.length;
    updateCarousel();
  }

  function resetTimer() {
    clearInterval(slideInterval);
    startTimer();
  }

  function startTimer() {
    slideInterval = setInterval(nextSlide, 5000);
  }

  // Event Listeners
  nextBtn.onclick = () => { nextSlide(); resetTimer(); };
  prevBtn.onclick = () => { prevSlide(); resetTimer(); };

  // Initialize
  startTimer();
  window.addEventListener('resize', updateCarousel);

  // Date and Time Function
  function updateDateTime() {
    const now = new Date();
    const options = { 
      weekday: 'long', year: 'numeric', month: 'long', 
      day: 'numeric', hour: '2-digit', minute: '2-digit', 
      second: '2-digit', hour12: true 
    };
    document.getElementById('datetime').textContent = now.toLocaleDateString('en-US', options);
  }

  updateDateTime();
  setInterval(updateDateTime, 1000);
</script>

</body>
</html>
