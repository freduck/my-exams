<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE-LAMBO COLLEGE</title>
<style>
  * { padding: 0; margin: 0; box-sizing: border-box; }
  body { font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; }

  .top { padding: 20px; background: #b91c1c; color: white; display: flex; justify-content: space-between; align-items: center; }
  
  main { flex: 1; padding: 20px; overflow: hidden; }
  .carousel { position: relative; max-width: 1000px; margin: 0 auto; overflow: hidden; background: #333; height: 400px; }
  .carousel-track { display: flex; transition: 0.5s; height: 100%; }
  .carousel-slide { min-width: 100%; height: 100%; position: relative; }
  
  /* Use object-fit to ensure images cover the area without distorting */
  .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
  
  .carousel-slide span { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); color: white; padding: 10px; }
  
  footer { background: #b91c1c; color: white; padding: 20px; text-align: center; }
</style>
</head>
<body>

  <header class="top">
    <h2>DE-LAMBO COLLEGE</h2>
  </header>

  <main>
    <div class="carousel">
      <div class="carousel-track" id="track">
        <div class="carousel-slide"><img src="images/img.jpg" alt="Slide"><span>Image 1</span></div>
        <div class="carousel-slide"><img src="images/img-1.jpg" alt="Slide"><span>Image 2</span></div>
        <div class="carousel-slide"><img src="images/img-2.jpg" alt="Slide"><span>Image 3</span></div>
        <div class="carousel-slide"><img src="images/img-5.jpg" alt="Slide"><span>Image 4</span></div>
        <div class="carousel-slide"><img src="images/img-6.jpg" alt="Slide"><span>Image 5</span></div>
      </div>
    </div>
  </main>

  <footer>&copy; 2026 De-Lambo College</footer>

<script>
  let index = 0;
  const track = document.getElementById('track');
  const slides = document.querySelectorAll('.carousel-slide');

  setInterval(() => {
    index = (index + 1) % slides.length;
    track.style.transform = `translateX(-${index * 100}%)`;
  }, 3000);
</script>
</body>
</html>
